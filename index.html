<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Alessandro e Carine 💕</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

<style>
body {
  margin:0;
  background:#1c1c1c;
  font-family:Arial,sans-serif;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h2 {
  margin:10px 0;
  color:white;
  font-size:18px;
}

/* FLIPBOOK */
#flipbook {
  width:100%;
  height:90vh;
  max-width:1400px;
}

/* PÁGINAS */
.page {
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.zoom-container {
  width:100%;
  height:100%;
  touch-action:none;
  display:flex;
  justify-content:center;
  align-items:center;
}

.page img {
  width:100%;
  height:100%;
  object-fit:contain;
  transition: transform 0.2s ease;
}

/* CONTROLES (ESCONDIDOS) */
.controls {
  position:fixed;
  bottom:-80px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
  transition:all 0.3s ease;
  pointer-events:none;
}

.controls.show {
  bottom:20px;
  pointer-events:auto;
}

button {
  padding:14px 22px;
  font-size:20px;
  border-radius:20px;
  border:none;
  background:rgba(0,0,0,0.7);
  color:white;
}

.map-links {
  position: relative;
  width: 100%;
  height: 100%;
}

.map-links img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* LINKS INVISÍVEIS */
.link {
  position: absolute;
  bottom: 5%;
  height: 25%;
  width: 18%;
  display: block;
}

/* POSIÇÕES DOS 4 ÍCONES */
.l1 { left: 7%; }
.l2 { left: 29%; }
.l3 { left: 51%; }
.l4 { left: 73%; }

/* DEBUG OPCIONAL (ver áreas clicáveis) */
.link:hover {
  outline: 2px solid gold;
}

/* MOBILE AJUSTES */
@media (max-width:768px){
  h2 {
    font-size:16px;
  }
}
</style>
</head>

<body>

<h2>Convite de casamento Ale e Ca</h2>

<div id="flipbook">

  <div class="page"><div class="zoom-container"><img src="page_1.jpg"></div></div>
  <div class="page"><div class="zoom-container"><img src="page_2.jpg"></div></div>
  <div class="page"><div class="zoom-container"><img src="page_33.jpg"></div></div>

<div class="page">
  <div class="zoom-container">

    <div class="map-links">

      <img src="page_4.jpg" alt="Página 4">

      <!-- 1. CONFIRMAÇÃO -->
      <a class="link l1" 
         href="https://noivos.casar.com/alessandro-e-carine?preview_as_guest=1&_ref_=/one-page/_start" 
         target="_blank"></a>

      <!-- 2. LOCAL CERIMÔNIA -->
      <a class="link l2" 
         href="https://maps.app.goo.gl/JSsJnbxP3dMPLTxx6" 
         target="_blank"></a>

      <!-- 3. LOCAL FESTA -->
      <a class="link l3" 
         href="https://maps.app.goo.gl/RuZBNpCiHyTbVH9U8" 
         target="_blank"></a>

      <!-- 4. PIX (QR) -->
      <a class="link l4" 
         href="#" 
         onclick="alert('Use a câmera do celular para escanear o QR Code 😊')"></a>

    </div>

  </div>
</div>



  <!-- <div class="page"><div class="zoom-container"><img src="page_44.pdf"></div></div> --> 

</div>

<div class="controls">
  <button onclick="prevPage()">◀</button>
  <button onclick="nextPage()">▶</button>
</div>

<script>

// --------------------
// MOBILE DETECTION
// --------------------
function isMobile() {
  return window.innerWidth <= 768;
}

// --------------------
// TAMANHO DINÂMICO
// --------------------
function getSize() {
  return {
    width: window.innerWidth,
    height: window.innerHeight * 0.9
  };
}

// --------------------
// INIT FLIPBOOK
// --------------------
function initFlipbook() {

  let mobile = isMobile();
  let size = getSize();

  $("#flipbook").turn({
    width: mobile ? size.width : Math.min(1200, size.width),
    height: size.height,
    autoCenter: true,
    display: mobile ? "single" : "double",
    gradients: true,
    elevation: 50
  });

}

// --------------------
// CONTROLES
// --------------------
function nextPage() {
  $("#flipbook").turn("next");
}

function prevPage() {
  $("#flipbook").turn("previous");
}

// --------------------
// CONTROLES VISUAIS
// --------------------
let controlsTimeout;

function showControls() {
  $(".controls").addClass("show");

  clearTimeout(controlsTimeout);

  controlsTimeout = setTimeout(() => {
    $(".controls").removeClass("show");
  }, 2500);
}

// interação do usuario
$(document).on("click touchstart", function () {
  showControls();
});

// --------------------
// ZOOM (PINCH + DOUBLE TAP)
// --------------------
function enableZoom() {

  $(".zoom-container").each(function () {

    let scale = 1;
    let startDist = 0;
    let img = $(this).find("img")[0];

    // DOUBLE TAP
    let lastTap = 0;

    this.addEventListener("touchend", function(e) {

      let now = new Date().getTime();

      if (now - lastTap < 300) {
        scale = scale === 1 ? 2 : 1;
        img.style.transform = `scale(${scale})`;
      }

      lastTap = now;
    });

    // PINCH
    this.addEventListener("touchmove", function(e) {

      if (e.touches.length === 2) {

        e.preventDefault();

        let dx = e.touches[0].clientX - e.touches[1].clientX;
        let dy = e.touches[0].clientY - e.touches[1].clientY;

        let dist = Math.sqrt(dx*dx + dy*dy);

        if (!startDist) startDist = dist;

        scale = dist / startDist;
        scale = Math.max(1, Math.min(scale, 3));

        img.style.transform = `scale(${scale})`;
      }

    }, { passive:false });

    this.addEventListener("touchend", function() {
      startDist = 0;
    });

  });

}

// --------------------
// PRELOAD
// --------------------
function preload() {
  $("img").each(function () {
    let i = new Image();
    i.src = this.src;
  });
}

// --------------------
// RELOAD RESPONSIVO
// --------------------
function reloadFlipbook() {
  if ($("#flipbook").data("turn")) {
    $("#flipbook").turn("destroy");
  }
  initFlipbook();
}

// --------------------
// INIT
// --------------------
$(document).ready(function () {

  preload();
  initFlipbook();
  enableZoom();

  $(window).on("resize orientationchange", function () {
    reloadFlipbook();
  });

});
</script>

</body>
</html>
